<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="black-header">
        <div class="container">
            <div class="brand">⚙️ Admin Panel</div>
            <div class="nav-links">
                <button id="logout-btn" class="btn btn-outline" style="color:white; border-color:white;">Logout</button>
            </div>
        </div>
    </header>
    <main class="container" id="dashboard-container">
        <div style="display:flex; gap:12px; flex-wrap:wrap; margin:20px 0;">
            <button id="upload-btn" class="btn btn-primary">+ Upload Media</button>
            <button class="btn btn-outline" onclick="document.getElementById('create-year-modal').classList.add('active')">+ Add Year</button>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card"><div class="number" id="total-media">0</div><div class="label">Total Media</div></div>
            <div class="stat-card"><div class="number" id="total-storage">0 MB</div><div class="label">Storage</div></div>
            <div class="stat-card"><div class="number" id="total-views">0</div><div class="label">Total Views</div></div>
            <div class="stat-card"><div class="number" id="total-shares">0</div><div class="label">Total Shares</div></div>
            <div class="stat-card"><div class="number" id="total-years">0</div><div class="label">Years</div></div>
            <div class="stat-card"><div class="number" id="visitors-today">0</div><div class="label">Visitors Today</div></div>
            <div class="stat-card"><div class="number" id="visitors-month">0</div><div class="label">This Month</div></div>
            <div class="stat-card"><div class="number" id="visitors-year">0</div><div class="label">This Year</div></div>
        </div>

        <!-- Charts -->
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:30px;">
            <div style="background:white; border:1px solid #e2e8f0; border-radius:12px; padding:20px;">
                <h3>Top 5 Views</h3>
                <canvas id="viewsChart" height="150"></canvas>
            </div>
            <div style="background:white; border:1px solid #e2e8f0; border-radius:12px; padding:20px;">
                <h3>Top 5 Shares</h3>
                <canvas id="sharesChart" height="150"></canvas>
            </div>
        </div>

        <!-- Media Table -->
        <div class="table-wrap">
            <h3>All Media</h3>
            <table>
                <thead><tr><th>Title</th><th>Type</th><th>Views</th><th>Action</th></tr></thead>
                <tbody id="media-table-body"></tbody>
            </table>
        </div>

        <!-- Admin Management -->
        <div style="background:white; border:1px solid #e2e8f0; border-radius:12px; padding:20px; margin:20px 0;">
            <h3>Manage Admins</h3>
            <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px;">
                <input id="new-admin-email" placeholder="Email" class="form-group" style="flex:1; min-width:150px;">
                <input id="new-admin-password" type="password" placeholder="Password" class="form-group" style="flex:1; min-width:150px;">
                <select id="new-admin-role" class="form-group" style="flex:0;">
                    <option value="admin">Admin</option>
                    <option value="super">Super</option>
                </select>
                <button id="add-admin-btn" class="btn btn-primary">Add</button>
            </div>
            <div id="admins-list"></div>
        </div>
    </main>

    <!-- Upload Modal -->
    <div id="upload-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Upload Media</h3>
            <div class="form-group"><label>File</label><input type="file" id="upload-file" accept="image/*,video/*"></div>
            <div class="form-group"><label>Title</label><input id="upload-title" placeholder="Title"></div>
            <div class="form-group"><label>Description</label><textarea id="upload-desc" rows="2"></textarea></div>
            <div class="form-group"><label>Capture Date</label><input type="date" id="upload-capture-date"></div>
            <div class="form-group"><label>Location</label><input id="upload-location" placeholder="Location"></div>
            <div class="form-group"><label>People</label><input id="upload-people" placeholder="People"></div>
            <div class="form-group"><label>Event</label><input id="upload-event" placeholder="Event"></div>
            <div class="form-group"><label>Tags</label><input id="upload-tags" placeholder="comma, separated"></div>
            <div class="form-group"><label>Year</label><select id="upload-year"></select></div>
            <button id="confirm-upload" class="btn btn-primary">Upload</button>
            <button id="close-modal" class="btn btn-outline" style="margin-left:10px;">Cancel</button>
        </div>
    </div>

    <!-- Create Year Modal -->
    <div id="create-year-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Add Year</h3>
            <div class="form-group"><label>Year</label><input type="number" id="new-year" placeholder="e.g. 2025"></div>
            <div class="form-group"><label>President Name</label><input id="new-president" placeholder="President"></div>
            <button id="create-year-btn" class="btn btn-primary">Create</button>
            <button class="btn btn-outline" onclick="document.getElementById('create-year-modal').classList.remove('active')">Cancel</button>
        </div>
    </div>

    <script type="module" src="../js/admin.js"></script>
</body>
</html>
