<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel – RCSVIT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,Helvetica,sans-serif; background:#f4f4f4; color:#222; display:flex; min-height:100vh; }
        .site-header { position:fixed; top:0; left:0; right:0; height:70px; background:#000; display:flex; align-items:center; justify-content:center; z-index:1000; }
        .site-title { color:#fff; font-size:32px; font-weight:bold; }
        .sidebar { width:240px; background:#111; color:#ccc; padding:20px 0; display:flex; flex-direction:column; position:fixed; top:70px; left:0; bottom:0; z-index:500; transition:transform 0.3s; }
        .sidebar a { display:flex; align-items:center; gap:12px; padding:14px 20px; color:#bbb; text-decoration:none; font-size:15px; transition:background 0.2s, color 0.2s; border-left:4px solid transparent; cursor:pointer; }
        .sidebar a:hover, .sidebar a.active { background:#222; color:#fff; border-left-color:#fff; }
        .sidebar a i { width:20px; text-align:center; font-size:16px; }
        .sidebar .brand { padding:0 20px 20px; font-size:22px; font-weight:bold; color:#fff; letter-spacing:0.5px; border-bottom:1px solid #333; margin-bottom:10px; display:flex; align-items:center; gap:10px; }
        .sidebar .brand i { font-size:24px; }
        .main-content { margin-left:240px; margin-top:70px; padding:30px; flex:1; transition:margin-left 0.3s; }
        .tab-section { display:none; }
        .tab-section.active { display:block; }
        .stats-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:20px; margin-bottom:30px; }
        .stat-card { background:#fff; border:1px solid #d9d9d9; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.04); display:flex; align-items:center; gap:15px; }
        .stat-icon { width:48px; height:48px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; color:#fff; background:#000; }
        .stat-info h3 { font-size:13px; text-transform:uppercase; letter-spacing:0.5px; color:#777; margin-bottom:5px; }
        .stat-info .value { font-size:24px; font-weight:700; }
        .stat-info .sub { font-size:12px; color:#999; }
        .panel-row { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:30px; }
        .panel { background:#fff; border:1px solid #d9d9d9; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
        .panel h3 { font-size:16px; margin-bottom:15px; display:flex; align-items:center; gap:8px; }
        .top-list { list-style:none; }
        .top-list li { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid #f0f0f0; }
        .top-list li:last-child { border-bottom:none; }
        .top-list img, .top-list video { width:40px; height:30px; object-fit:cover; border-radius:4px; }
        .top-list .name { flex:1; font-weight:500; }
        .top-list .count { color:#777; font-size:13px; }
        .form-card { background:#fff; border:1px solid #d9d9d9; border-radius:12px; padding:30px; max-width:800px; margin:0 auto; }
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; font-weight:600; margin-bottom:5px; color:#333; }
        .form-group input, .form-group textarea, .form-group select { width:100%; padding:11px 14px; border:1px solid #d9d9d9; border-radius:8px; font-size:15px; transition:border 0.2s; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline:none; border-color:#000; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
        .btn { display:inline-block; padding:11px 22px; font-size:15px; font-weight:600; border-radius:8px; cursor:pointer; text-decoration:none; transition:background 0.2s; border:none; }
        .btn-primary { background:#000; color:#fff; }
        .btn-primary:hover { background:#1a1a1a; }
        .btn-danger { background:#d32f2f; color:#fff; }
        .btn-danger:hover { background:#b71c1c; }
        .btn-outline { background:#fff; color:#222; border:2px solid #bbb; }
        .btn-outline:hover { background:#f4f4f4; }
        .btn-block { width:100%; }
        .media-table { width:100%; border-collapse:collapse; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
        .media-table th, .media-table td { padding:12px 16px; text-align:left; border-bottom:1px solid #eee; }
        .media-table th { background:#f9f9f9; font-weight:600; }
        .mobile-toggle { display:none; position:fixed; top:80px; left:10px; z-index:1100; background:#000; color:#fff; border:none; padding:8px 12px; border-radius:6px; font-size:20px; }
        .upload-file-btn { display:inline-block; padding:12px 24px; background:#000; color:#fff; border:none; border-radius:8px; font-weight:600; cursor:pointer; margin-bottom:20px; text-align:center; }
        .upload-file-btn:hover { background:#222; }
        .file-preview { display:flex; align-items:center; gap:15px; background:#f4f4f4; padding:10px 15px; border-radius:8px; margin-bottom:15px; }
        .file-preview img, .file-preview video { width:80px; height:60px; object-fit:cover; border-radius:6px; }
        .file-info { flex:1; }
        .file-info .file-name { font-weight:600; margin-bottom:3px; }
        .file-info .file-size { font-size:12px; color:#777; }
        .remove-file { background:none; border:none; color:#c62828; cursor:pointer; font-size:18px; }
        .progress-bar { height:8px; background:#e0e0e0; border-radius:4px; margin:15px 0; overflow:hidden; }
        .progress-fill { height:100%; background:#000; width:0%; transition:width 0.4s; }
        .message { margin-bottom:15px; font-weight:500; }
        .message-success { color:#2e7d32; }
        .message-error { color:#c62828; }
        @media (max-width:900px) {
            .sidebar { transform:translateX(-240px); }
            .sidebar.open { transform:translateX(0); }
            .main-content { margin-left:0; }
            .mobile-toggle { display:block; }
            .panel-row { grid-template-columns:1fr; }
            .form-row { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <span class="site-title">RCSVIT Admin</span>
    </header>
    <button class="mobile-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    <aside class="sidebar" id="sidebar">
        <div class="brand"><i class="fas fa-shield-alt"></i> Admin</div>
        <a data-tab="dashboard" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a data-tab="upload"><i class="fas fa-cloud-upload-alt"></i> Upload Media</a>
        <a data-tab="manage"><i class="fas fa-edit"></i> Manage Media</a>
        <a data-tab="admins"><i class="fas fa-users-cog"></i> Manage Admins</a>
        <a data-tab="library"><i class="fas fa-eye"></i> View Library</a>
        <a onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </aside>
    <main class="main-content" id="mainContent">
        <!-- Dashboard Tab -->
        <div class="tab-section active" id="tab-dashboard">
            <h2 style="margin-bottom:25px;">Dashboard Overview</h2>
            <div class="stats-grid" id="statsGrid"><p>Loading stats…</p></div>
            <div class="stats-grid" id="visitorStatsGrid"></div>
            <div class="stats-grid" id="infraStatsGrid"></div>
            <div class="panel-row">
                <div class="panel"><h3><i class="fas fa-chart-bar"></i> Top 5 Media (Views)</h3><canvas id="topMediaChart" height="200"></canvas></div>
                <div class="panel"><h3><i class="fas fa-share-alt"></i> Top 5 Shared</h3>
                    <ul class="top-list" id="topSharedList"></ul>
                </div>
            </div>
            <div class="panel"><h3><i class="fas fa-chart-line"></i> Visitor Trend (Last 7 Days)</h3><canvas id="visitorChart" height="80"></canvas></div>
        </div>
        <!-- Upload Tab (simplified fields) -->
        <div class="tab-section" id="tab-upload">
            <h2 style="margin-bottom:20px;">Upload Media</h2>
            <div class="form-card">
                <div id="uploadMessage"></div>
                <form id="uploadForm">
                    <label class="upload-file-btn" for="fileInput">Choose File</label>
                    <input type="file" id="fileInput" accept="image/*,video/*" style="display:none;" onchange="handleFileSelect()">
                    <div id="filePreview" class="file-preview" style="display:none;">
                        <div id="previewContainer"></div>
                        <div class="file-info">
                            <div class="file-name" id="fileName"></div>
                            <div class="file-size" id="fileSize"></div>
                        </div>
                        <button type="button" class="remove-file" id="removeFile"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="progress-bar" id="progressBar" style="display:none;">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Title *</label><input type="text" id="title" required></div>
                        <div class="form-group"><label>Capture Date</label><input type="date" id="capture_date"></div>
                    </div>
                    <div class="form-group"><label>Description</label><textarea id="description" rows="3"></textarea></div>
                    <div class="form-row">
                        <div class="form-group"><label>Location</label><input type="text" id="location"></div>
                        <div class="form-group"><label>People</label><input type="text" id="people"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Year *</label><select id="upload-year"></select></div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" id="uploadBtn">Upload Media</button>
                </form>
            </div>
        </div>
        <!-- Manage Media, Manage Admins, View Library tabs (same as before, but edit modal uses simplified fields) -->
    </main>
    <script type="module" src="../js/admin.js"></script>
</body>
</html>
