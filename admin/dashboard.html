<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard – RCSVIT</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .admin-dashboard .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin: 24px 0;
        }
        .admin-dashboard .stat-card {
            background: #fff;
            border: 1px solid #d9d9d9;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .admin-dashboard .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: #000;
        }
        .admin-dashboard .stat-card .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #777;
            margin-top: 4px;
        }
        .admin-dashboard .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .admin-dashboard .chart-box {
            background: #fff;
            border: 1px solid #d9d9d9;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .admin-dashboard .chart-box h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .admin-dashboard .table-wrap {
            background: #fff;
            border: 1px solid #d9d9d9;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            overflow-x: auto;
        }
        .admin-dashboard table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-dashboard th, .admin-dashboard td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .admin-dashboard th {
            background: #f9f9f9;
            font-weight: 600;
            color: #333;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: #fff;
            padding: 32px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 12px 32px rgba(0,0,0,0.15);
        }
        .modal-box h3 { margin-bottom: 20px; font-size: 1.4rem; font-weight: 700; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 4px; color: #333; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #000; }
        .btn-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-primary { background: #000; color: #fff; }
        .btn-primary:hover { background: #222; }
        .btn-outline { background: transparent; border: 1px solid #bbb; color: #333; }
        .btn-outline:hover { background: #f5f5f5; }
        .btn-danger { background: #d32f2f; color: #fff; }
        .btn-danger:hover { background: #b71c1c; }
        @media (max-width: 768px) {
            .admin-dashboard .chart-row { grid-template-columns: 1fr; }
            .admin-dashboard .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .admin-dashboard .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <span class="site-title">RCSVIT Admin</span>
    </header>

    <main class="main-container admin-dashboard" id="dashboard-container">
        <div class="btn-row">
            <button id="upload-btn" class="btn btn-primary">+ Upload Media</button>
            <button class="btn btn-outline" onclick="document.getElementById('create-year-modal').classList.add('active')">+ Add Year</button>
            <button id="logout-btn" class="btn btn-outline" style="margin-left:auto;">Logout</button>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card"><div class="number" id="total-media">0</div><div class="label">Total Media</div></div>
            <div class="stat-card"><div class="number" id="total-storage">0 MB</div><div class="label">Storage</div></div>
            <div class="stat-card"><div class="number" id="total-views">0</div><div class="label">Total Views</div></div>
            <div class="stat-card"><div class="number" id="total-shares">0</div><div class="label">Total Shares</div></div>
            <div class="stat-card"><div class="number" id="total-years">0</div><div class="label">Years</div></div>
            <div class="stat-card"><div class="number" id="visitors-today">0</div><div class="label">Visitors Today</div></div>
            <div class="stat-card"><div class="number" id="visitors-month">0</div><div class="label">This Month</div></div>
            <div class="stat-card"><div class="number" id="visitors-year">0</div><div class="label">This Year</div></div>
        </div>

        <!-- Charts -->
        <div class="chart-row">
            <div class="chart-box"><h3>Top 5 Views</h3><canvas id="viewsChart" height="150"></canvas></div>
            <div class="chart-box"><h3>Top 5 Shares</h3><canvas id="sharesChart" height="150"></canvas></div>
        </div>

        <!-- Media Table -->
        <div class="table-wrap">
            <h3>All Media</h3>
            <table>
                <thead><tr><th>Title</th><th>Type</th><th>Views</th><th>Action</th></tr></thead>
                <tbody id="media-table-body"></tbody>
            </table>
        </div>

        <!-- Years Management -->
        <div class="table-wrap">
            <h3>Manage Years</h3>
            <table>
                <thead><tr><th>Year</th><th>President</th><th>Media Count</th><th>Actions</th></tr></thead>
                <tbody id="years-table-body"></tbody>
            </table>
        </div>

        <!-- Admin Management -->
        <div class="table-wrap">
            <h3>Manage Admins</h3>
            <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px;">
                <input id="new-admin-email" placeholder="Email" class="form-group" style="flex:1; min-width:150px; margin:0;">
                <input id="new-admin-password" type="password" placeholder="Password" class="form-group" style="flex:1; min-width:150px; margin:0;">
                <select id="new-admin-role" class="form-group" style="flex:0; margin:0;">
                    <option value="admin">Admin</option>
                    <option value="super">Super</option>
                </select>
                <button id="add-admin-btn" class="btn btn-primary">Add</button>
            </div>
            <div id="admins-list"></div>
        </div>
    </main>

    <!-- Upload Modal -->
    <div id="upload-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Upload Media</h3>
            <div class="form-group"><label>File</label><input type="file" id="upload-file" accept="image/*,video/*"></div>
            <div class="form-group"><label>Title</label><input id="upload-title" placeholder="Title"></div>
            <div class="form-group"><label>Description</label><textarea id="upload-desc" rows="2"></textarea></div>
            <div class="form-group"><label>Capture Date</label><input type="date" id="upload-capture-date"></div>
            <div class="form-group"><label>Location</label><input id="upload-location" placeholder="Location"></div>
            <div class="form-group"><label>People</label><input id="upload-people" placeholder="People"></div>
            <div class="form-group"><label>Event</label><input id="upload-event" placeholder="Event"></div>
            <div class="form-group"><label>Tags</label><input id="upload-tags" placeholder="comma, separated"></div>
            <div class="form-group"><label>Year</label><select id="upload-year"></select></div>
            <div style="display:flex; gap:12px; justify-content:flex-end;">
                <button id="confirm-upload" class="btn btn-primary">Upload</button>
                <button id="close-modal" class="btn btn-outline">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Create Year Modal (with cover image) -->
    <div id="create-year-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Add Year</h3>
            <div class="form-group">
                <label>Cover Image (optional)</label>
                <input type="file" id="year-cover-file" accept="image/*">
                <img id="year-cover-preview" style="max-width:100px; margin-top:8px; display:none; border-radius:8px;">
            </div>
            <div class="form-group"><label>Year</label><input type="number" id="new-year" placeholder="e.g. 2025"></div>
            <div class="form-group"><label>President Name</label><input id="new-president" placeholder="President"></div>
            <div style="display:flex; gap:12px; justify-content:flex-end;">
                <button id="create-year-btn" class="btn btn-primary">Create</button>
                <button class="btn btn-outline" onclick="document.getElementById('create-year-modal').classList.remove('active')">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="../js/admin.js"></script>
</body>
</html>
